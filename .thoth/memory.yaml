## Architecture Quick Reference
# index.js         — CLI entry point (npx thoth-init)
# templates/       — Template files for scaffolding (.thoth/, .agent/)
# package.json     — npm package config
# SPECIFICATION.md — Full Thoth specification

## What Thoth Does
# 1. Scaffolds .thoth/memory.yaml in any project
# 2. Creates .agent/workflows/session-start.md
# 3. Injects Thoth instructions into GEMINI.md / CLAUDE.md
# 4. Works standalone — no Anubis, no MCP needed
# 5. Non-interactive mode: npx thoth-init --yes

## Critical Design Decisions
# 1. Standalone distribution — CLI scaffolder, not a runtime dependency
# 2. Zero config — detects project type and generates appropriate memory
# 3. IDE rules injection — modifies GEMINI.md/CLAUDE.md directly
# 4. Three-layer knowledge: memory (state) + journal (why) + artifacts (deep)
# 5. Simple npm package — runs via npx, no global install needed

## Known Limitations
# - No CI pipeline (no .github/workflows/)
# - No GEMINI.md or CLAUDE.md
# - No .agent/workflows/
# - No tests beyond `node index.js --help`
# - Not yet published to npm

